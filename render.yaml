services:
  - type: web
    name: jwt-auth-app
    env: node
    buildCommand: npm install && npm run build
    startCommand: npm start
    disk:
      name: sqlite-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_PATH
        value: /data/database.sqlite
      - key: JWT_SECRET
        generateValue: true
